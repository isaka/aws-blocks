name: PR Checks

# Originally used pull_request_target so fork PRs get secrets and OIDC access.
# Workflow YAML is always sourced from the default branch (main) with that trigger.
# All checkout steps explicitly reference the PR head SHA.
#
# Security: this is a private repo. Gate 1 (Settings → Actions → General)
# requires approval for fork PRs from users without write access.
#
# Switched to `pull_request` so PRs can test their own workflow changes.
# E2E jobs additionally check github.event.pull_request.head.repo.full_name
# to skip for fork PRs (defense in depth — pull_request already blocks secrets).
# TODO: Verify with AppSec before making this repo public.

on:
  pull_request:
    branches: ['*']

# One run per PR. When a new commit is pushed, any still-running run for the
# same PR is cancelled. Prevents two concurrent `cdk deploy` invocations from
# racing on the same PR-scoped stack, which can leave a partial rollback
# wedged in DELETE_FAILED and block every later run until the stack is
# manually cleaned up in AWS.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  # Use the 'spec' reporter for node:test — produces a clean, hierarchical
  # pass/fail summary instead of verbose TAP output with per-test YAML blocks.
  NODE_OPTIONS: '--test-reporter=spec'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.check.outputs.source-changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(packages|test-apps)/'; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source-changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test-local:
    name: Build, Unit Tests, E2E Local
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Lint (advisory — annotations only, non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Lint deps (blocking)
        run: npm run lint:deps

      - name: Build
        run: npm run build

      - name: Check aws-blocks exports consistency
        run: npm run check:exports-consistency

      - name: Check API backward compatibility
        run: npm run check:api

      - name: Unit Tests
        run: npm run test:unit

      - name: E2E Test Local
        run: npm run test:e2e:local

      - name: Pack for local registry
        run: npm run publish:dry-run

      - name: Upload registry artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-registry
          path: dist-registry/
          retention-days: 1

  e2e-templates:
    name: E2E Templates
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Download registry artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-registry
          path: dist-registry/

      - name: Template E2E Tests
        run: bash scripts/test-templates-e2e.sh --skip-publish

  e2e-sandbox:
    name: E2E Sandbox
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Sandbox
        run: npm run test:e2e:sandbox

  e2e-sandbox-vpc:
    name: E2E Sandbox (VPC Smoke)
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: vpc-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Sandbox (VPC Smoke)
        run: npm run test:e2e:sandbox:vpc

  e2e-production:
    name: E2E Production
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Production
        run: npm run test:e2e:production

  e2e-supabase:
    name: E2E Supabase
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: publish
    env:
      # Pin the Supabase Root 2021 CA (public cert, committed) so every external-DB
      # connection in this suite runs verify-full — exercising the TLS verification
      # feature end-to-end instead of connecting unverified. externalDbSsl() reads
      # this; the explicit-engine tests read it too.
      DATABASE_CA_CERT: ${{ github.workspace }}/packages/bb-data/test/fixtures/supabase-ca.crt
    concurrency:
      group: e2e-supabase
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install pg_dump 18 (for the run-all baseline E2E)
        # The runner's default pg_dump may be older than the Supabase server, and
        # pg_dump's major must be >= the server's. Install the PGDG client so the
        # run-all baseline E2E (migrations-e2e) generates a real baseline instead of
        # skipping. Applying migrations needs no pg_dump — only generating one does.
        # Best-effort (continue-on-error): if the install ever fails, the gated E2E
        # just skips — it must not take down the crud/auth Supabase suites. Uses the
        # armored key via apt `signed-by` directly (no `gpg --dearmor`, which fails
        # on `/dev/tty` under sudo in CI).
        continue-on-error: true
        run: |
          sudo install -d /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /etc/apt/keyrings/pgdg.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch Supabase secrets
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id blocks/supabase-e2e \
            --query SecretString --output text)
          echo "$SECRET" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Apply test schema
        run: npx tsx packages/bb-data/test/apply-schema.ts

      - name: E2E Test Supabase
        run: npm run test:e2e:supabase

  e2e-hosting:
    name: E2E Hosting (${{ matrix.framework }})
    timeout-minutes: 60
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: spa
            app-dir: test-apps/hosting-spa
            script: test:e2e:hosting-spa
          - framework: nextjs
            app-dir: test-apps/hosting-ssr
            script: test:e2e:hosting-ssr
          - framework: nuxt
            app-dir: test-apps/hosting-ssr-nuxt
            script: test:e2e:hosting-ssr-nuxt
          - framework: astro
            app-dir: test-apps/hosting-ssr-astro
            script: test:e2e:hosting-ssr-astro
          - framework: astro-default404
            app-dir: test-apps/hosting-ssr-astro-default404
            script: test:e2e:hosting-ssr-astro-default404
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ matrix.framework }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E Test Hosting (${{ matrix.framework }})
        run: npm run ${{ matrix.script }}

      - name: Cleanup sandbox
        if: always()
        run: |
          cd ${{ matrix.app-dir }}
          npx tsx test/sandbox-destroy.ts aws-blocks/index.cdk.ts || true

  # Gate job — matches the branch protection required check name.
  # Skipped E2E jobs (no source changes) are treated as passing.
  # Note: Amplify interop tests live in a separate workflow
  # (e2e-amplify-interop.yml) so their failures don't show red here.
  build-and-test:
    name: Build and Test
    needs: [build-and-test-local, e2e-templates, e2e-sandbox, e2e-sandbox-vpc, e2e-production, e2e-supabase, e2e-hosting]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build-and-test-local.result }}" != "success" ]]; then
            echo "build-and-test-local failed"
            exit 1
          fi

          # E2E jobs must either succeed or be skipped (no source changes)
          if [[ "${{ needs.e2e-templates.result }}" != "success" && "${{ needs.e2e-templates.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-sandbox.result }}" != "success" && "${{ needs.e2e-sandbox.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-sandbox-vpc.result }}" != "success" && "${{ needs.e2e-sandbox-vpc.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-production.result }}" != "success" && "${{ needs.e2e-production.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-supabase.result }}" != "success" && "${{ needs.e2e-supabase.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-hosting.result }}" != "success" && "${{ needs.e2e-hosting.result }}" != "skipped" ]]; then
            echo "One or more E2E jobs failed"
            exit 1
          fi
