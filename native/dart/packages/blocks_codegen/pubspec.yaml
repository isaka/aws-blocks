name: blocks_codegen
description: Code generator for Blocks client SDK — reads OpenRPC spec and generates typed Dart clients.
version: 0.1.0
homepage: https://docs.aws.amazon.com/blocks/latest/devguide
repository: https://github.com/aws-devtools-labs/aws-blocks
issue_tracker: https://github.com/aws-devtools-labs/aws-blocks/issues

environment:
  sdk: ^3.3.0

dependencies:
  args: ^2.4.0
  build: ^2.4.0
  blocks_runtime: ^0.1.0

dev_dependencies:
  build_runner: ^2.4.0
  lints: ^6.0.0
  test: ^1.25.0
